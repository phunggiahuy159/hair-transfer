# Configuration for the merged FLUX.1-Kontext worker (Methods 2 & 3).
#
# A single worker (flux/kontext_server.py, run in .venv-flux) loads FLUX.1-Kontext-dev
# ONCE and serves both methods, sharing the model weights via from_pipe:
#   - Method 2 "FLUX Kontext" : /transfer        (prompt-driven edit, 2 images concatenated)
#   - Method 3 "SAM3 + Inpaint": /inpaint_transfer (SAM3 hair mask + reference inpaint)
#
# Both facebook/sam3 and black-forest-labs/FLUX.1-Kontext-dev are GATED on Hugging Face:
# accept their licenses and run `huggingface-cli login` before first use. SAM3 is only
# needed for Method 3 and is loaded lazily — Method 2 works with just Kontext.

kontext_repo: "black-forest-labs/FLUX.1-Kontext-dev"
sam3_repo: "facebook/sam3"

# Shared generation defaults.
# FLUX.1-Kontext is a ~1-megapixel model (its PREFERRED_KONTEXT_RESOLUTIONS are all
# ~1024x1024 area) and the pipeline internally normalizes conditioning/output to ~1MP.
# Keep size at 1024: 512 visibly degrades quality (downscaled, blurry crops) for no
# memory saving — with CPU offload (low_vram) the GPU peak is ~25-28GB either way.
size: 1024
num_inference_steps: 28
guidance_scale: 4.0          # FLUX.1-Kontext range is ~2.5-4.0; hair transfer is a large
                             # structural edit, so the higher end is needed — at 2.5 the
                             # model is too conservative and barely changes the hair.
low_vram: true               # enable_model_cpu_offload() on the shared pipeline (needed on 40GB cards)

# --- Method 2: prompt-driven edit (ID + reference placed side by side, result cropped) ---
# Tip: describing the TARGET hair explicitly (e.g. "long thick voluminous curly hair")
# drives a much stronger transfer than just "the right person's hairstyle". The web UI
# exposes this prompt so users can tailor it per reference.
edit_prompt: "Completely restyle the hair of the person on the LEFT so it exactly matches the hair of the person on the RIGHT: copy the RIGHT person's hair shape, length, volume, curl/wave pattern, texture and colour, changing the LEFT person's hair as much as needed even if it is very different. Keep the LEFT person's face, expression, skin tone and clothing identical, leave the RIGHT person unchanged, and keep the side-by-side layout."

# --- Method 3: SAM3 hair mask + FLUX.1-Kontext reference inpainting ---
mask_prompt: "hair"
inpaint_prompt: "Replace the hair in the masked region with the hairstyle from the reference image. Match its colour, length and texture, and blend naturally with the head and lighting."
strength: 1.0
mask_blur: 12                # blur_factor for pipe.mask_processor.blur (smoother seams)
mask_dilate: 8               # grow the SAM3 mask by N px first (0 = off)
score_threshold: 0.5         # SAM3 instance score threshold
mask_threshold: 0.5          # SAM3 mask binarization threshold

server:
  host: "127.0.0.1"
  port: 8987
