# Configuration for the FLUX.2 [klein] 9B hair-transfer method (Method 2).
#
# This method runs in a SEPARATE virtual environment (.venv-flux) with a modern
# diffusers (>= 0.38, providing Flux2KleinPipeline). It is served by
# flux/flux_server.py and reached over local HTTP by gradio_demo_full.py.

# Hugging Face repo for the model weights. If this exact repo is gated/unavailable,
# swap to "black-forest-labs/FLUX.2-klein-base-9B" (same Flux2KleinPipeline) or to
# "black-forest-labs/FLUX.2-klein-9b-kv" (uses Flux2KleinKVPipeline + ~4 steps).
model_repo: "black-forest-labs/FLUX.2-klein-9B"

# Default text instruction. Image 1 = the person (ID), image 2 = the hair reference.
default_prompt: "Transfer the hairstyle from the second image onto the person in the first image. Keep the first person's face, identity, skin tone, and background unchanged; only replace the hair."

num_inference_steps: 50
guidance_scale: 4.0
size: 1024

# Set true to call enable_model_cpu_offload() — slower, but fits smaller GPUs.
low_vram: false

server:
  host: "127.0.0.1"
  port: 8987
